<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git & GitHub para Estadística y Python | UAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        code,
        pre {
            font-family: 'Fira Code', monospace;
        }

        .sidebar-item.active {
            @apply bg-blue-600 text-white shadow-lg;
        }

        .code-card {
            @apply bg-slate-900 rounded-xl p-5 relative border border-slate-700 my-4;
        }

        .copy-btn {
            @apply absolute top-3 right-3 text-slate-500 hover:text-white transition-all p-2 bg-slate-800 rounded-md;
        }

        .instr-step {
            @apply flex items-center gap-3 mb-6 font-bold text-slate-900 border-b pb-2;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800">

    <div class="flex flex-col lg:flex-row min-h-screen">

        <aside class="w-full lg:w-80 bg-slate-900 text-slate-300 p-8 lg:fixed lg:h-full z-50">
            <div class="flex items-center gap-4 mb-10">
                <div class="bg-blue-600 p-3 rounded-2xl shadow-lg">
                    <i class="fa-brands fa-github text-2xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-white">UAP Stats</h1>
                    <span class="text-[10px] text-blue-400 font-bold tracking-widest">ESTADÍSTICA Y PYTHON</span>
                </div>
            </div>

            <nav id="nav-menu" class="space-y-1">
            </nav>

            <div class="mt-10 p-5 bg-slate-800/50 rounded-xl border border-slate-700">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">Estado del Curso</p>
                <div class="flex justify-between text-xs mb-1">
                    <span id="progress-text">0%</span>
                </div>
                <div class="w-full bg-slate-700 h-1 rounded-full">
                    <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-500"></div>
                </div>
            </div>
        </aside>

        <main class="flex-1 lg:ml-80 p-6 md:p-16 lg:p-20 max-w-5xl mx-auto">
            <div id="content-view" class="min-h-[60vh]">
            </div>

            <div class="mt-16 pt-8 border-t flex justify-between">
                <button onclick="changeMod(-1)" id="prevBtn"
                    class="text-slate-400 hover:text-blue-600 font-bold flex items-center gap-2">
                    <i class="fa-solid fa-chevron-left"></i> Anterior
                </button>
                <button onclick="changeMod(1)" id="nextBtn"
                    class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700">
                    Siguiente <i class="fa-solid fa-chevron-right ml-2"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        const modules = [
            {
                title: "1. Identidad en Git y GitHub",
                icon: "fa-user-gear",
                content: `
                    <h2 class="text-3xl font-black mb-6">Configura tu Firma y Acceso</h2>
                    <p class="mb-4 text-slate-600">Como estudiante de estadística, tus scripts y análisis deben llevar tu autoría. Primero, configura tu identidad local en Git.</p>
                    
                    <div class="code-card">
                        <code class="text-blue-400 text-sm" id="c1">git config --global user.name "Tu Nombre Real"<br>git config --global user.email "tu_correo@uap.edu.bo"</code>
                        <button onclick="copy('c1')" class="copy-btn"><i class="fa-regular fa-copy"></i></button>
                    </div>
                    
                    <h3 class="text-xl font-bold mt-8 mb-4">Autenticación en GitHub</h3>
                    <p class="mb-4 text-slate-600 text-sm">Asegúrate de crear una cuenta en <a href="https://github.com" target="_blank" class="text-blue-600 font-bold hover:underline">github.com</a> con el mismo correo. Al subir código por primera vez, GitHub te pedirá iniciar sesión. Usa el <b>Git Credential Manager</b> (la ventana emergente) y autoriza con tu navegador.</p>
                `
            },
            {
                title: "2. Repositorio Estadístico",
                icon: "fa-globe",
                content: `
                    <h2 class="text-3xl font-black mb-6">Tu Proyecto en la Nube</h2>
                    <p class="mb-4 text-slate-600">El repositorio es donde vivirán tus datasets, notebooks y código Python. Para crearlo correctamente en GitHub:</p>
                    <div class="space-y-4">
                        <div class="bg-white p-5 rounded-xl border-l-4 border-blue-500 shadow-sm">
                            <h4 class="font-bold mb-1">Paso 1: Iniciar Creación</h4>
                            <p class="text-sm">En GitHub, haz clic en el botón verde <b>"New"</b> (Nuevo repositorio).</p>
                        </div>
                        <div class="bg-white p-5 rounded-xl border-l-4 border-indigo-500 shadow-sm">
                            <h4 class="font-bold mb-1">Paso 2: Nomenclatura del Proyecto</h4>
                            <p class="text-sm">Usa nombres descriptivos sin espacios ni acentos. Ej: <code>analisis-regresion-pando</code>, <code>dashboard-estadistico</code>, o <code>practica-anova</code>.</p>
                        </div>
                        <div class="bg-white p-5 rounded-xl border-l-4 border-purple-500 shadow-sm">
                            <h4 class="font-bold mb-1">Paso 3: Configuración Vital</h4>
                            <p class="text-sm">Déjalo en <b>Public</b>. <br><span class="text-red-500 font-bold">¡MUY IMPORTANTE!</span> <b>NO</b> marques "Add a README file" ni "Add .gitignore". Haremos esto desde tu computadora para evitar conflictos al vincular.</p>
                        </div>
                    </div>
                `
            },
            {
                title: "3. Filtro para Data Science",
                icon: "fa-filter",
                content: `
                    <h2 class="text-3xl font-black mb-6">El Archivo .gitignore</h2>
                    <p class="mb-4 text-slate-600">En proyectos de estadística con Python (Pandas, Streamlit, Jupyter), generamos archivos masivos y entornos virtuales que <b>NUNCA</b> deben subir a GitHub porque saturan el repositorio.</p>
                    <p class="text-sm font-bold mb-2">Crea un archivo llamado <code>.gitignore</code> en tu carpeta local y pega esto:</p>
                    <div class="code-card">
                        <pre class="text-emerald-400 text-xs" id="c3"># Entornos virtuales de Python
venv/
env/
.venv/

# Jupyter Notebooks checkpoints
.ipynb_checkpoints/

# Datasets pesados (Evitar subir datos masivos)
*.csv
*.xlsx
*.parquet

# Archivos compilados y configuración local
__pycache__/
*.pyc
.env</pre>
                        <button onclick="copy('c3')" class="copy-btn"><i class="fa-regular fa-copy"></i></button>
                    </div>
                `
            },
            {
                title: "4. Vinculación y Subida",
                icon: "fa-cloud-arrow-up",
                content: `
                    <h2 class="text-3xl font-black mb-6">Primer Envío (Push)</h2>
                    <p class="mb-4 text-slate-600">Abre la terminal en la carpeta de tu proyecto local y ejecuta en orden:</p>
                    
                    <h4 class="font-bold text-xs text-blue-600 uppercase mb-2">A. Inicializar y Guardar Localmente</h4>
                    <div class="code-card">
                        <code class="text-slate-300 text-xs" id="c4">git init<br>git add .<br>git commit -m "Estructura inicial del análisis estadístico"</code>
                        <button onclick="copy('c4')" class="copy-btn"><i class="fa-regular fa-copy"></i></button>
                    </div>

                    <h4 class="font-bold text-xs text-blue-600 uppercase mt-6 mb-2">B. Conectar a GitHub y Subir</h4>
                    <p class="text-xs text-slate-500 mb-2">Copia el enlace HTTPs de tu repositorio vacío en GitHub y reemplázalo aquí:</p>
                    <div class="code-card">
                        <code class="text-slate-300 text-xs" id="c5">git branch -M main<br>git remote add origin https://github.com/USUARIO/REPO.git<br>git push -u origin main</code>
                        <button onclick="copy('c5')" class="copy-btn"><i class="fa-regular fa-copy"></i></button>
                    </div>
                `
            },
            {
                title: "5. Ciclo de Trabajo",
                icon: "fa-rotate",
                content: `
                    <h2 class="text-3xl font-black mb-6">El Flujo del Estadístico</h2>
                    <p class="mb-4 text-slate-600">A medida que avanzas en tu análisis de datos, limpias variables o creas nuevos gráficos, debes guardar tu progreso regularmente.</p>
                    
                    <div class="bg-slate-100 p-5 rounded-xl border border-slate-200">
                        <h4 class="font-bold text-sm mb-3 text-slate-800">Cada vez que termines un avance importante:</h4>
                        <div class="code-card mt-0 mb-3">
                            <code class="text-slate-300 text-xs" id="c8">git add .<br>git commit -m "Se agregaron gráficos de dispersión y matriz de correlación"<br>git push</code>
                            <button onclick="copy('c8')" class="copy-btn"><i class="fa-regular fa-copy"></i></button>
                        </div>
                        <p class="text-xs text-slate-600"><b>Consejo:</b> Usa mensajes descriptivos en tus commits que indiquen qué modelo o cálculo estadístico aplicaste.</p>
                    </div>
                `
            },
            {
                title: "6. Clonar y Portabilidad",
                icon: "fa-laptop-code",
                content: `
                    <h2 class="text-3xl font-black mb-6">Trabajar en el Laboratorio</h2>
                    <p class="mb-6 text-slate-600">Para continuar tu proyecto en otra computadora de la universidad, <b>NO uses pendrives</b>. Sigue el estándar:</p>
                    
                    <div class="space-y-6">
                        <div>
                            <span class="step-pill bg-blue-100 text-blue-700 px-2 py-1 rounded text-[10px] font-bold">PASO 1: DESCARGAR REPOSITORIO</span>
                            <div class="code-card">
                                <code class="text-blue-300 text-xs" id="c6">git clone https://github.com/USUARIO/REPO.git</code>
                                <button onclick="copy('c6')" class="copy-btn"><i class="fa-regular fa-copy"></i></button>
                            </div>
                        </div>
                        <div>
                            <span class="step-pill bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-bold">PASO 2: RECUPERAR LIBRERÍAS DE PYTHON</span>
                            <p class="text-xs text-slate-500 mt-2">Como ignoraste el entorno virtual con el <code>.gitignore</code>, debes recrearlo e instalar las librerías necesarias (Pandas, Streamlit, etc).</p>
                            <div class="code-card">
                                <code class="text-blue-300 text-xs" id="c7">python -m venv venv<br>.\\venv\\Scripts\\activate<br>pip install -r requirements.txt</code>
                                <button onclick="copy('c7')" class="copy-btn"><i class="fa-regular fa-copy"></i></button>
                            </div>
                        </div>
                    </div>
                `
            }
        ];

        let currentIdx = 0;

        function updateUI() {
            const menu = document.getElementById('nav-menu');
            const view = document.getElementById('content-view');
            const progress = ((currentIdx + 1) / modules.length) * 100;

            // Render Nav
            menu.innerHTML = '';
            modules.forEach((mod, i) => {
                const b = document.createElement('button');
                b.className = `sidebar-item w-full flex items-center gap-3 px-4 py-4 rounded-xl text-sm font-bold mb-1 transition-all ${i === currentIdx ? 'active' : 'hover:bg-slate-800 text-slate-400'}`;
                b.innerHTML = `<i class="fa-solid ${mod.icon} w-5"></i> ${mod.title}`;
                b.onclick = () => { currentIdx = i; updateUI(); };
                menu.appendChild(b);
            });

            // Render Content
            view.innerHTML = `<div class="animate-fade">${modules[currentIdx].content}</div>`;

            // Progress
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('progress-text').innerText = Math.round(progress) + '%';

            // Buttons
            document.getElementById('prevBtn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
            document.getElementById('nextBtn').innerText = currentStepText();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function currentStepText() {
            return currentIdx === modules.length - 1 ? "¡Guía Completa!" : "Siguiente Paso";
        }

        function changeMod(n) {
            currentIdx += n;
            if (currentIdx < 0) currentIdx = 0;
            if (currentIdx >= modules.length) currentIdx = modules.length - 1;
            updateUI();
        }

        async function copy(id) {
            const code = document.getElementById(id).innerText;
            await navigator.clipboard.writeText(code);
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fa-solid fa-check text-emerald-400"></i>';
            setTimeout(() => { btn.innerHTML = '<i class="fa-regular fa-copy"></i>'; }, 2000);
        }

        updateUI();
    </script>

    <style>
        .animate-fade {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>

</html>
