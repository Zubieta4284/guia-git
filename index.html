<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadística con Python: Guía Definitiva | UAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .code-block { font-family: 'Fira Code', monospace; background: #0f172a; color: #38bdf8; }
        .sidebar-item.active { @apply bg-blue-600 text-white shadow-xl scale-105; }
        .module-card { transition: all 0.3s ease; }
        .module-card:hover { transform: translateY(-5px); }
        .glossary-term { @apply font-bold text-blue-600 border-b border-blue-200 cursor-help; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800">

    <header class="lg:hidden bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 z-[100]">
        <span class="font-black tracking-tighter">ESTADÍSTICA UAP</span>
        <button id="menuToggle" class="text-2xl"><i class="fa-solid fa-bars"></i></button>
    </header>

    <div class="flex min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-slate-900 text-slate-300 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out overflow-y-auto">
            <div class="p-8">
                <div class="flex items-center gap-3 mb-10">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-900/20">
                        <i class="fa-solid fa-chart-line text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-extrabold text-white leading-tight">Master Stat</h1>
                        <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Eduardo Zubieta</p>
                    </div>
                </div>

                <nav class="space-y-1" id="nav-list">
                    </nav>

                <div class="mt-12 p-6 bg-slate-800/50 rounded-2xl border border-slate-700/50">
                    <p class="text-xs font-bold text-slate-500 mb-4 uppercase">Estado del Curso</p>
                    <div class="flex justify-between text-xs mb-2">
                        <span>Progreso</span>
                        <span id="progress-val" class="font-bold text-blue-400">0%</span>
                    </div>
                    <div class="h-1.5 bg-slate-700 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-blue-500 w-0 transition-all duration-500"></div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 lg:ml-72 transition-all">
            <div class="max-w-5xl mx-auto px-6 py-12 lg:px-16 lg:py-20">
                <div id="content-area" class="min-h-[60vh]">
                    </div>

                <footer class="mt-16 pt-8 border-t border-slate-200 flex flex-col sm:flex-row justify-between gap-4">
                    <button onclick="changeMod(-1)" id="prevBtn" class="flex items-center gap-3 font-bold text-slate-400 hover:text-slate-900 transition-colors">
                        <i class="fa-solid fa-chevron-left"></i> Anterior
                    </button>
                    <button onclick="changeMod(1)" id="nextBtn" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold shadow-xl hover:bg-blue-600 transition-all flex items-center gap-3">
                        Continuar <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </footer>
            </div>
        </main>
    </div>

    <script>
        const appData = [
            {
                category: "FUNDAMENTOS TÉCNICOS",
                title: "Configuración de la 'Burbuja' (venv)",
                icon: "fa-box-open",
                content: `
                    <div class="animate-in fade-in slide-in-from-bottom-4 duration-700">
                        <span class="bg-blue-100 text-blue-700 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Fase 0</span>
                        <h2 class="text-4xl font-black text-slate-900 mt-4 mb-6">Aislamiento con Entornos Virtuales</h2>
                        <p class="text-lg text-slate-600 leading-relaxed mb-8">Un <span class="glossary-term">Virtual Environment (venv)</span> es una "burbuja" aislada. Evita que las librerías de Estadística afecten a otros proyectos de tu computadora. [cite: 4, 5]</p>
                        
                        <div class="grid md:grid-cols-2 gap-6 mb-10">
                            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <h4 class="font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-terminal text-blue-500"></i> Paso 1: Crear</h4>
                                <div class="code-block p-4 rounded-2xl text-xs relative group">
                                    <code>python -m venv venv</code>
                                    <button onclick="copy('python -m venv venv')" class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-regular fa-copy"></i></button>
                                </div>
                                <p class="text-[11px] text-slate-500 mt-3 italic">"venv" es el módulo y la carpeta contenedora. [cite: 7]</p>
                            </div>
                            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <h4 class="font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-bolt text-amber-500"></i> Paso 2: Activar</h4>
                                <div class="code-block p-4 rounded-2xl text-xs mb-2">
                                    <code>.\\venv\\Scripts\\activate</code>
                                </div>
                                <p class="text-[11px] text-slate-500">En Windows, esto "te mete" dentro de la burbuja. </p>
                            </div>
                        </div>

                        <div class="bg-slate-900 rounded-3xl p-8 text-white">
                            <h4 class="text-amber-400 font-bold mb-4"><i class="fa-solid fa-triangle-exclamation"></i> Nota de Ingeniería: Errores de Permisos</h4>
                            <p class="text-sm opacity-80 mb-6">Si PowerShell bloquea la ejecución, ejecuta esto como Administrador una sola vez: </p>
                            <code class="block bg-slate-800 p-4 rounded-xl text-xs text-blue-300 break-all">Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser</code>
                        </div>
                    </div>
                `
            },
            {
                category: "CONTROL DE VERSIONES",
                title: "Git & La Receta de Dependencias",
                icon: "fa-code-branch",
                content: `
                    <h2 class="text-4xl font-black text-slate-900 mb-6">Portabilidad Profesional</h2>
                    <p class="text-lg text-slate-600 mb-10">Para que tu proyecto de Estadística sea portátil, Git debe saber qué ignorar y qué registrar.</p>

                    <div class="space-y-6">
                        <div class="bg-white p-8 rounded-3xl border border-slate-200 flex gap-6 items-start">
                            <div class="hidden sm:flex w-12 h-12 bg-red-100 text-red-600 rounded-2xl items-center justify-center shrink-0">
                                <i class="fa-solid fa-eye-slash text-xl"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-xl mb-2 text-slate-900">El archivo .gitignore</h4>
                                <p class="text-slate-600 text-sm mb-4">Crea un archivo llamado <code>.gitignore</code> y escribe <code>venv/</code>. Esto evita subir miles de archivos innecesarios a GitHub.</p>
                            </div>
                        </div>

                        <div class="bg-white p-8 rounded-3xl border border-slate-200 flex gap-6 items-start">
                            <div class="hidden sm:flex w-12 h-12 bg-green-100 text-green-600 rounded-2xl items-center justify-center shrink-0">
                                <i class="fa-solid fa-list-check text-xl"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-xl mb-2 text-slate-900">Congelar la Receta (requirements.txt)</h4>
                                <p class="text-slate-600 text-sm mb-4">Genera la lista de librerías instaladas para que tus compañeros puedan replicar tu entorno.</p>
                                <div class="code-block p-4 rounded-xl text-xs inline-block">
                                    <code>pip freeze > requirements.txt</code>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                category: "ESTADÍSTICA DESCRIPTIVA",
                title: "Variables Cualitativas (Frecuencias)",
                icon: "fa-table-list",
                content: `
                    <span class="bg-purple-100 text-purple-700 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest text-sm">Fase 2</span>
                    <h2 class="text-4xl font-black text-slate-900 mt-4 mb-6">Tratamiento de Nominales</h2>
                    <p class="text-lg text-slate-600 mb-10">Utilizamos algoritmos de agregación para identificar la frecuencia de categorías como "Carreras Universitarias". [cite: 18, 19]</p>

                    <div class="bg-white p-8 rounded-3xl border border-slate-200 mb-8 overflow-hidden">
                        <h4 class="font-black text-xs uppercase text-slate-400 mb-4 tracking-tighter italic">Lógica de Python (Pandas) [cite: 21]</h4>
                        <pre class="code-block p-6 rounded-2xl text-[11px] leading-relaxed overflow-x-auto">
# Conteo de frecuencia absoluta (fi)
frec_cualita = df_est["carrera"].value_counts().reset_index()
frec_cualita.columns = ["carrera", "fi"]

# Frecuencia relativa (hi)
frec_cualita["hi"] = frec_cualita["fi"] / len(df_est)</pre>
                    </div>

                    <div class="bg-blue-50 p-8 rounded-3xl border border-blue-100">
                        <h4 class="font-bold text-blue-900 mb-2 italic underline text-sm">Visualización Recomendada</h4>
                        <p class="text-blue-800 text-sm mb-4">Para variables cualitativas, el <strong>Gráfico de Torta</strong> o <strong>Barras</strong> es ideal. [cite: 36, 42]</p>
                        <div class="bg-white p-4 rounded-2xl shadow-sm inline-block">
                            <i class="fa-solid fa-chart-pie text-blue-600 text-4xl"></i>
                        </div>
                    </div>
                `
            },
            {
                category: "ESTADÍSTICA AVANZADA",
                title: "Datos Agrupados (Regla de Sturges)",
                icon: "fa-calculator",
                content: `
                    <span class="bg-emerald-100 text-emerald-700 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest text-sm">Fase 4</span>
                    <h2 class="text-4xl font-black text-slate-900 mt-4 mb-6">El Algoritmo de Sturges</h2>
                    <p class="text-lg text-slate-600 mb-10">Cuando los datos son continuos o muy variados (como la Edad), aplicamos rigor académico para agruparlos. [cite: 26, 27]</p>

                    <div class="space-y-8">
                        <div class="bg-slate-900 p-8 rounded-3xl shadow-2xl border-t-4 border-emerald-500">
                            <h4 class="text-white font-bold mb-4 italic underline text-sm">Implementación Matemática [cite: 28]</h4>
                            <pre class="text-emerald-400 text-xs leading-loose">
n = len(df_est)
# Regla de Sturges: k = 1 + 3.322 * log10(n)
k = int(np.ceil(1 + 3.322 * np.log10(n)))
amplitud = (df['Edad'].max() - df['Edad'].min()) / k</pre>
                        </div>

                        <div class="bg-white p-8 rounded-3xl border border-slate-200">
                            <h4 class="font-bold text-slate-900 mb-4 flex items-center gap-2 italic underline text-sm"><i class="fa-solid fa-chart-area text-emerald-500"></i> Histograma y Polígono [cite: 40]</h4>
                            <p class="text-slate-600 text-sm mb-6">El histograma muestra la densidad, mientras que el polígono conecta las <strong>Marcas de Clase (Xi)</strong> para visualizar la tendencia. [cite: 40]</p>
                        </div>
                    </div>
                `
            }
        ];

        let currentIdx = 0;

        function renderNav() {
            const nav = document.getElementById('nav-list');
            nav.innerHTML = '';
            appData.forEach((mod, i) => {
                const btn = document.createElement('button');
                btn.className = `sidebar-item w-full flex items-center gap-3 px-5 py-4 rounded-2xl text-left transition-all text-sm font-semibold mb-2 ${i === currentIdx ? 'active' : 'hover:bg-slate-800'}`;
                btn.innerHTML = `<i class="fa-solid ${mod.icon} opacity-70"></i> <span>${mod.title}</span>`;
                btn.onclick = () => { currentIdx = i; updateApp(); };
                nav.appendChild(btn);
            });
        }

        function updateApp() {
            const content = document.getElementById('content-area');
            const mod = appData[currentIdx];
            
            content.innerHTML = `
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.3em] mb-2">${mod.category}</p>
                ${mod.content}
            `;

            // Progreso
            const p = ((currentIdx + 1) / appData.length) * 100;
            document.getElementById('progress-bar').style.width = `${p}%`;
            document.getElementById('progress-val').innerText = `${Math.round(p)}%`;

            // Botones
            document.getElementById('prevBtn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
            document.getElementById('nextBtn').innerText = currentIdx === appData.length - 1 ? 'Finalizar Guía' : 'Siguiente Sección';
            
            renderNav();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function changeMod(step) {
            currentIdx += step;
            if (currentIdx < 0) currentIdx = 0;
            if (currentIdx >= appData.length) {
                alert("¡Excelente, Eduardo! Has revisado toda la Guía de Laboratorio 1.");
                currentIdx = appData.length - 1;
            }
            updateApp();
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            alert("Comando copiado");
        }

        // Toggle Sidebar Móvil
        document.getElementById('menuToggle').onclick = () => {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        };

        // Init
        updateApp();
    </script>
</body>
</html>
