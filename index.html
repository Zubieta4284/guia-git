<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadística con Python: Guía Definitiva | UAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        code, pre { font-family: 'Fira Code', monospace; }
        .sidebar-item.active { @apply bg-blue-600 text-white shadow-lg transform scale-105 transition-all; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <div class="fixed top-0 left-0 w-full h-1.5 bg-slate-200 z-[100]">
        <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-500 w-0 shadow-[0_0_10px_rgba(37,99,235,0.5)]"></div>
    </div>

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <aside class="w-full lg:w-80 bg-slate-900 text-slate-300 p-8 lg:fixed lg:h-full z-50 shadow-2xl overflow-y-auto border-r border-slate-800">
            <div class="flex items-center gap-4 mb-10">
                <div class="bg-blue-600 p-3 rounded-2xl shadow-inner">
                    <i class="fa-solid fa-graduation-cap text-2xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold text-white leading-none tracking-tighter">StatDev Pro</h1>
                    <span class="text-[10px] text-blue-400 font-black uppercase tracking-widest italic">UAP - Eduardo Zubieta</span>
                </div>
            </div>

            <nav class="space-y-1" id="nav-menu">
                </nav>

            <div class="mt-12 pt-8 border-t border-slate-800">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Glosario Técnico</p>
                <div class="space-y-4">
                    <details class="text-xs group cursor-pointer">
                        <summary class="font-bold text-slate-400 group-hover:text-blue-400 transition-colors">VENV</summary>
                        <p class="mt-2 text-slate-500 leading-relaxed italic">Entorno virtual. Una burbuja aislada para instalar librerías sin ensuciar el sistema global.</p>
                    </details>
                    <details class="text-xs group cursor-pointer">
                        <summary class="font-bold text-slate-400 group-hover:text-blue-400 transition-colors">STURGES</summary>
                        <p class="mt-2 text-slate-500 leading-relaxed italic">Algoritmo matemático (1 + 3.322 * log10(n)) para calcular cuántos intervalos necesita un histograma.</p>
                    </details>
                </div>
            </div>
        </aside>

        <main class="flex-1 lg:ml-80 p-6 md:p-16 lg:p-20 max-w-6xl mx-auto">
            <div id="module-container" class="animate-fade min-h-[70vh]">
                </div>

            <div class="mt-20 pt-10 border-t border-slate-200 flex flex-col sm:flex-row gap-4 justify-between items-center">
                <button id="prevBtn" class="w-full sm:w-auto px-8 py-3 rounded-xl font-bold text-slate-400 hover:bg-slate-200 hover:text-slate-900 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-left"></i> Anterior
                </button>
                <div class="text-xs font-black text-slate-300 uppercase tracking-widest hidden md:block" id="footer-step">Paso 1 de 6</div>
                <button id="nextBtn" class="w-full sm:w-auto px-10 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all flex items-center justify-center gap-2">
                    Siguiente <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        // DATA DE LOS MÓDULOS (Fusión de Git y Estadística)
        const modules = [
            {
                id: 'infra',
                title: 'Infraestructura Python',
                icon: 'fa-microchip',
                content: `
                    <div class="mb-10">
                        <span class="text-blue-600 font-black text-[10px] tracking-[0.3em] uppercase">Módulo 1: El Entorno</span>
                        <h2 class="text-4xl font-black text-slate-900 mt-2 mb-6">Configuración de la "Burbuja"</h2>
                        <p class="text-lg text-slate-600 leading-relaxed">Antes de analizar datos, debemos crear un espacio de trabajo aislado. Esto garantiza que tu código funcione hoy y en 5 años.</p>
                    </div>
                    
                    <div class="grid gap-6">
                        <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-4 opacity-5"><i class="fa-solid fa-box-archive text-8xl"></i></div>
                            <h3 class="text-xl font-bold mb-4 flex items-center gap-3 italic"><i class="fa-solid fa-terminal text-blue-500"></i> Creación de VENV</h3>
                            <p class="text-sm text-slate-600 mb-6 leading-relaxed">Ejecuta este comando en la raíz de tu proyecto para crear la carpeta aislada.</p>
                            <div class="bg-slate-900 p-5 rounded-2xl relative group">
                                <code class="text-blue-300 text-sm">python -m venv venv</code>
                                <button onclick="copy('python -m venv venv')" class="absolute right-4 top-4 text-slate-500 hover:text-white transition-colors"><i class="fa-regular fa-copy"></i></button>
                            </div>
                        </div>

                        <div class="bg-amber-50 p-8 rounded-3xl border border-amber-100">
                            <h4 class="text-amber-800 font-bold mb-3 flex items-center gap-2"><i class="fa-solid fa-shield-halved"></i> Seguridad: El .gitignore</h4>
                            <p class="text-sm text-amber-700 leading-relaxed">Crea un archivo llamado <code class="bg-white px-1">.gitignore</code> e incluye la línea <code class="bg-white px-1">venv/</code>. <strong>Nunca</strong> subas el entorno virtual a GitHub; es pesado y específico para tu PC actual.</p>
                        </div>
                    </div>
                `
            },
            {
                id: 'git',
                title: 'Control de Versiones',
                icon: 'fa-code-branch',
                content: `
                    <h2 class="text-4xl font-black text-slate-900 mb-6 italic underline">Portabilidad Profesional</h2>
                    <p class="text-lg text-slate-600 mb-10 leading-relaxed">Como científico de datos, tu "receta" de librerías es tan importante como tu código.</p>
                    
                    <div class="bg-white p-8 rounded-3xl border border-slate-200 mb-8">
                        <h4 class="font-bold text-slate-900 mb-4 tracking-tighter">La "Receta" de Librerías (Requirements)</h4>
                        <p class="text-sm text-slate-500 mb-6 italic">Genera una lista de todo lo instalado para que otro estudiante pueda clonar tu proyecto.</p>
                        <div class="bg-slate-900 p-6 rounded-2xl relative">
                            <code class="text-green-400 block text-sm">pip freeze > requirements.txt</code>
                            <button onclick="copy('pip freeze > requirements.txt')" class="absolute right-6 top-6 text-slate-600"><i class="fa-regular fa-copy"></i></button>
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="p-6 bg-blue-50 rounded-2xl border border-blue-100">
                            <h5 class="font-bold text-blue-900 mb-2 italic">Git Commit</h5>
                            <p class="text-xs text-blue-800 opacity-80">Guarda una "foto" de tu avance con un ID único (SHA).</p>
                        </div>
                        <div class="p-6 bg-purple-50 rounded-2xl border border-purple-100">
                            <h5 class="font-bold text-purple-900 mb-2 italic">Git Push</h5>
                            <p class="text-xs text-purple-800 opacity-80">Sube tu código a la nube (GitHub) para respaldo total.</p>
                        </div>
                    </div>
                `
            },
            {
                id: 'stats-cual',
                title: 'Frecuencia Cualitativa',
                icon: 'fa-table-list',
                content: `
                    <span class="text-blue-600 font-black text-[10px] tracking-[0.3em] uppercase">Módulo 3: Estadística</span>
                    <h2 class="text-4xl font-black text-slate-900 mt-2 mb-6">Variables Nominales</h2>
                    <p class="text-lg text-slate-600 mb-10 leading-relaxed">Utilizamos el conteo de frecuencias para variables que no tienen un orden numérico (ej. Carreras Universitarias).</p>

                    <div class="bg-white p-8 rounded-3xl border border-slate-200 mb-8 overflow-hidden">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest italic">Algoritmo de Conteo (Pandas)</h4>
                            <button onclick="copy('conteo_cualitativo')" class="text-blue-600 text-xs font-bold hover:underline">Copiar Código</button>
                        </div>
                        <pre class="code-block p-6 rounded-2xl text-[11px] leading-relaxed overflow-x-auto" id="conteo_cualitativo">
# Conteo de frecuencia absoluta (fi)
# value_counts() cuenta repeticiones de cada categoría
frec_cualita = df_est["carrera"].value_counts().reset_index()
frec_cualita.columns = ["carrera", "fi"]

# Frecuencia relativa (hi)
# Dividimos fi entre el total de filas len(df_est)
frec_cualita["hi"] = frec_cualita["fi"] / len(df_est)</pre>
                        <p class="mt-6 text-xs text-slate-500 italic bg-slate-50 p-4 rounded-xl border-l-4 border-blue-500"><strong>¿Por qué usamos value_counts?</strong> Es el método más eficiente de Pandas para realizar agregaciones rápidas sobre columnas categóricas.</p>
                    </div>
                `
            },
            {
                id: 'stats-sturges',
                title: 'Agrupación (Sturges)',
                icon: 'fa-calculator',
                content: `
                    <h2 class="text-3xl font-black text-slate-900 mb-6 underline">El Algoritmo de Sturges</h2>
                    <p class="text-lg text-slate-600 mb-10">Para variables continuas con muchos valores distintos, agrupamos los datos en intervalos óptimos.</p>

                    <div class="bg-slate-900 p-8 rounded-3xl shadow-xl mb-8">
                        <h4 class="text-emerald-400 font-bold mb-6 text-sm uppercase italic tracking-widest">Cálculo de Parámetros (Numpy)</h4>
                        <pre class="text-slate-300 text-xs leading-loose">
n = len(df_est) # Tamaño de la muestra
rango = df['Edad'].max() - df['Edad'].min()

# Regla de Sturges (Rigor Académico)
# np.ceil redondea hacia arriba para cubrir todos los datos
k = int(np.ceil(1 + 3.322 * np.log10(n)))
amplitud = rango / k</pre>
                    </div>

                    <div class="bg-white p-8 rounded-3xl border border-slate-200">
                        <h4 class="font-bold text-slate-900 mb-2 italic underline text-sm">¿Por qué usar Logaritmos?</h4>
                        <p class="text-sm text-slate-600 italic">Sturges utiliza el logaritmo en base 10 porque asume una distribución normal de los datos, permitiendo que la cantidad de intervalos (k) crezca de forma controlada respecto al tamaño de la muestra (n).</p>
                    </div>
                `
            },
            {
                id: 'viz',
                title: 'Visualización Científica',
                icon: 'fa-chart-area',
                content: `
                    <h2 class="text-4xl font-black text-slate-900 mb-6">Arquitectura de Gráficos</h2>
                    <p class="text-lg text-slate-600 mb-10">Convertimos tablas frías en conocimiento visual usando Matplotlib y Seaborn.</p>

                    <div class="grid md:grid-cols-2 gap-8 mb-10">
                        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm module-card">
                            <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mb-4"><i class="fa-solid fa-chart-column"></i></div>
                            <h5 class="font-bold mb-2 italic text-sm italic">Histograma</h5>
                            <p class="text-xs text-slate-500 leading-relaxed italic">Ideal para ver la densidad de frecuencia de datos agrupados. Las barras están unidas por ser una variable continua.</p>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm module-card">
                            <div class="w-12 h-12 bg-purple-100 text-purple-600 rounded-xl flex items-center justify-center mb-4"><i class="fa-solid fa-chart-line"></i></div>
                            <h5 class="font-bold mb-2 italic text-sm italic">Ojiva</h5>
                            <p class="text-xs text-slate-500 leading-relaxed italic">Gráfico de la <strong>frecuencia acumulada</strong>. Nos dice cuántos datos hay "por debajo" de un punto de corte.</p>
                        </div>
                    </div>

                    <div class="bg-slate-900 p-8 rounded-3xl text-xs">
                        <h4 class="text-blue-400 font-bold mb-4 uppercase italic">Configuración de Estilo Pro</h4>
                        <code class="text-slate-400"># Estilo académico con rejilla blanca clara<br>plt.style.use('seaborn-v0_8-whitegrid')</code>
                    </div>
                `
            }
        ];

        let currentIdx = 0;

        // Función principal para renderizar el UI
        function updateUI() {
            const container = document.getElementById('module-container');
            const navMenu = document.getElementById('nav-menu');
            const footerStep = document.getElementById('footer-step');
            
            // 1. Cargar Contenido
            const mod = modules[currentIdx];
            container.innerHTML = mod.content;
            
            // 2. Generar Menú Lateral
            navMenu.innerHTML = '<p class="text-[10px] font-bold text-slate-600 uppercase tracking-widest mb-4">Plan de Estudios</p>';
            modules.forEach((m, index) => {
                const btn = document.createElement('button');
                btn.className = `sidebar-item w-full flex items-center gap-3 px-5 py-4 rounded-xl transition-all duration-300 text-sm font-semibold mb-1 ${index === currentIdx ? 'active' : 'hover:bg-slate-800'}`;
                btn.innerHTML = `<i class="fa-solid ${m.icon} w-5"></i> <span>${m.title}</span>`;
                btn.onclick = () => { currentIdx = index; updateUI(); window.scrollTo({top:0, behavior:'smooth'}); };
                navMenu.appendChild(btn);
            });

            // 3. Barra de Progreso Dinámica
            const progress = ((currentIdx + 1) / modules.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            
            // 4. Footer
            footerStep.innerText = `Paso ${currentIdx + 1} de ${modules.length}`;
            document.getElementById('prevBtn').disabled = currentIdx === 0;
            document.getElementById('prevBtn').style.opacity = currentIdx === 0 ? '0.2' : '1';
            document.getElementById('nextBtn').innerHTML = currentIdx === modules.length - 1 ? '¡Misión Cumplida!' : 'Continuar <i class="fa-solid fa-arrow-right"></i>';
        }

        // Navegación
        document.getElementById('nextBtn').onclick = () => {
            if (currentIdx < modules.length - 1) {
                currentIdx++;
                updateUI();
                window.scrollTo({top:0, behavior:'smooth'});
            } else {
                alert("¡Felicidades Eduardo! Has terminado la Guía Profesional de Estadística con Python.");
            }
        };

        document.getElementById('prevBtn').onclick = () => {
            if (currentIdx > 0) {
                currentIdx--;
                updateUI();
                window.scrollTo({top:0, behavior:'smooth'});
            }
        };

        // Utilidad: Copiar Código
        function copy(elementId) {
            let textToCopy = "";
            if(document.getElementById(elementId).tagName === "CODE" || document.getElementById(elementId).tagName === "PRE") {
                textToCopy = document.getElementById(elementId).innerText;
            } else {
                textToCopy = elementId; // Si enviamos texto plano
            }
            
            navigator.clipboard.writeText(textToCopy);
            alert("✅ Comando/Código copiado al portapapeles. ¡Listo para VS Code!");
        }

        // Inicialización
        updateUI();
    </script>
</body>
</html>
